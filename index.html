<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Unbounded:wght@400;700&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070a10;--s1:#0c1018;--border:#1a2540;
  --eur:#4f8ef7;--huf:#f0a732;--usdt:#26d9a0;--usd:#ff5c7a;--czk:#b48bf7;
  --uah:#ffd166;--a1:#26d9a0;--a2:#4f8ef7;
  --text:#dde4f0;--muted:#4a5878;--green:#26d9a0;--red:#ff5c7a;--gold:#ffd166;
  --orange:#fb923c;
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;}
.nav-logo{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--green);padding:16px 20px 16px 0;border-right:1px solid var(--border);margin-right:4px;letter-spacing:.05em;}
.nav-tab{padding:16px 18px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.05em;}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green);}
.nav-tab:hover:not(.active){color:var(--text);}

/* PAGE */
.page{display:none;padding:20px 24px;max-width:1200px;margin:0 auto;}
.page.active{display:block;}

/* GRID */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 13px;border-top:2px solid transparent;position:relative;}
.card.eur{border-top-color:var(--eur);}.card.huf{border-top-color:var(--huf);}
.card.usdt{border-top-color:var(--usdt);}.card.usd{border-top-color:var(--usd);}
.card.czk{border-top-color:var(--czk);}.card.a1c{border-top-color:var(--a1);}
.card.a2c{border-top-color:var(--a2);}
.card.pa{border-top-color:var(--gold);}.card.pb{border-top-color:var(--usd);}
.c-name{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.c-val{font-size:15px;font-weight:700;margin-bottom:3px;}
.c-sub{font-size:10px;color:var(--muted);margin-bottom:2px;}
.c-sub.pos{color:var(--green);}.c-sub.neg{color:var(--red);}.c-sub.warn{color:var(--orange);}

/* ROUND BADGE */
.round-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.05em;background:rgba(251,146,60,.15);color:var(--orange);}

/* SECTION */
.section{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.st{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;}

/* FORM */
.row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.field input,.field select,.field textarea{
  background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;
  padding:9px 11px;outline:none;transition:border-color .2s;appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--green);}
.field textarea{resize:none;height:36px;font-size:11px;}
/* Hide number spinners */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
.fl{flex:2;min-width:120px;}.fs{flex:1;min-width:80px;}.fxs{width:90px;}
.arrow{color:var(--muted);font-size:16px;padding-bottom:9px;flex-shrink:0;}

/* BTN */
.btn{padding:9px 15px;border:none;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.btn-g{background:var(--green);color:#070a10;}.btn-g:hover{opacity:.85;}
.btn-full{width:100%;padding:13px;}
.btn-o{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-o:hover{color:var(--text);border-color:var(--text);}
.btn-r{background:none;border:1px solid var(--red);color:var(--red);}
.btn-r:hover{opacity:.8;}
.btn-y{background:none;border:1px solid var(--gold);color:var(--gold);}
.btn-y:hover{opacity:.8;}

/* LOG */
.log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.log-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;}
.btn-row{display:flex;gap:7px;}
.log-list{display:flex;flex-direction:column;gap:7px;}
.li{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:11px 13px;
  display:grid;grid-template-columns:32px 1fr auto auto;gap:10px;align-items:center;}
.li-n{font-size:10px;color:var(--muted);background:var(--bg);border-radius:5px;padding:3px 6px;text-align:center;}
.li-m{font-size:12px;margin-bottom:2px;line-height:1.6;}
.li-s{font-size:10px;color:var(--muted);}
.li-p{text-align:right;white-space:nowrap;}
.li-pv{font-size:12px;font-weight:700;}
.li-pp{font-size:10px;color:var(--muted);}
.db{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:3px;}
.db:hover{color:var(--red);}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:11px;border:1px dashed var(--border);border-radius:9px;}

/* TAGS */
.tag{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin:0 2px;vertical-align:middle;}
.t-eur{background:rgba(79,142,247,.15);color:var(--eur);}
.t-huf{background:rgba(240,167,50,.15);color:var(--huf);}
.t-usdt{background:rgba(38,217,160,.15);color:var(--usdt);}
.t-usd{background:rgba(255,92,122,.15);color:var(--usd);}
.t-czk{background:rgba(180,139,247,.15);color:var(--czk);}
.t-uah{background:rgba(255,209,102,.15);color:var(--uah);}
.ab{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:5px;}
.ab-a1{background:rgba(38,217,160,.15);color:var(--a1);}
.ab-a2{background:rgba(79,142,247,.15);color:var(--a2);}

/* SETTINGS */
.settings-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.si{display:flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:7px 11px;}
.si label{font-size:9px;color:var(--muted);}
.si input{background:none;border:none;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;width:72px;outline:none;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.chart-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.bar-chart{display:flex;flex-direction:column;gap:7px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-lbl{font-size:10px;color:var(--muted);width:72px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--bg);border-radius:3px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-val{font-size:10px;font-weight:600;width:90px;text-align:right;flex-shrink:0;}

/* ROUNDS */
.round-item{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:7px;}
.round-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.round-title{font-size:11px;font-weight:700;}
.round-meta{font-size:10px;color:var(--muted);}
.round-profits{display:flex;gap:12px;flex-wrap:wrap;}
.rp-item{font-size:11px;}
.rp-cur{color:var(--muted);margin-right:4px;}

/* DIVIDER */
.div{height:1px;background:var(--border);margin:16px 0;}

/* SHOP */
.avg-box{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;}
.avg-item .av-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.avg-item .av-val{font-size:13px;font-weight:700;color:var(--gold);}
.avg-item .av-val.green{color:var(--green);}

@media(max-width:800px){
  .g5,.g3{grid-template-columns:repeat(2,1fr);}
  .charts-grid{grid-template-columns:1fr;}
  .arrow{display:none;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">TRACKER</div>
  <div class="nav-tab active" id="ntab-exchange">ОБМЕННИК</div>
  <div class="nav-tab" id="ntab-rounds">РАУНДЫ</div>
  <div class="nav-tab" id="ntab-shop">МАГАЗИН</div>
</nav>

<!-- EXCHANGE -->
<div class="page active" id="page-exchange">
  <div class="settings-row" style="padding-top:16px">
    <div class="si"><label>EUR капитал</label><input type="number" id="cap-eur" value="3000"></div>
    <div class="si"><label>HUF капитал</label><input type="number" id="cap-huf" value="2000000"></div>
    <div class="si"><label>USDT капитал</label><input type="number" id="cap-usdt" value="3000"></div>
    <div class="si"><label>USD капитал</label><input type="number" id="cap-usd" value="0"></div>
    <div class="si"><label>CZK капитал</label><input type="number" id="cap-czk" value="0"></div>
    <div class="si"><label>Агент 2 доля %</label><input type="number" id="a2-pct" value="30" min="1" max="99"></div>
  </div>
  <div class="g5" id="ex-assets"></div>
  <div class="g2" id="ex-agents"></div>
  <div class="section">
    <div class="st">Новая сделка</div>
    <div class="row">
      <div class="field fl"><label>Ты отдаёшь</label><input type="number" id="ex-give-amt" placeholder="20000"></div>
      <div class="field fxs"><label>Валюта</label>
        <select id="ex-give-cur">
          <option value="eur">EUR</option><option value="huf">HUF</option>
          <option value="usdt">USDT</option><option value="usd">USD</option><option value="czk">CZK</option>
        </select>
      </div>
      <div class="arrow">→</div>
      <div class="field fl"><label>Клиент отдаёт</label><input type="number" id="ex-get-amt" placeholder="22400"></div>
      <div class="field fxs"><label>Валюта</label>
        <select id="ex-get-cur">
          <option value="usdt">USDT</option><option value="eur">EUR</option>
          <option value="huf">HUF</option><option value="usd">USD</option><option value="czk">CZK</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field fl"><label id="ex-rate-lbl">Рыночный курс (1 € = ? USDT)</label><input type="number" id="ex-rate" placeholder="1.08"></div>
      <div class="field fs"><label>Спред %</label><input type="number" id="ex-spread" placeholder="2.0" step="0.1"></div>
      <div class="field fxs">
        <label>Режим</label>
        <select id="ex-calc-mode">
          <option value="give">От моей суммы</option>
          <option value="get">От суммы клиента</option>
        </select>
      </div>
      <div class="field fxs"><label>Агент</label>
        <select id="ex-agent"><option value="a1">Агент 1</option><option value="a2">Агент 2</option></select>
      </div>
      <div class="field fl"><label>Клиент</label><input type="text" id="ex-client" placeholder="@username"></div>
      <div class="field fl"><label>Заметка</label><textarea id="ex-note" placeholder="..."></textarea></div>
    </div>
    <div id="ex-calc-hint" style="font-size:11px;color:var(--muted);margin-bottom:12px;min-height:18px;"></div>
    <button class="btn btn-g btn-full" id="btn-ex-deal">ЗАФИКСИРОВАТЬ СДЕЛКУ →</button>
  </div>
  <div class="charts-grid" id="ex-charts"></div>
  <div class="log-hdr">
    <div class="log-title">История сделок</div>
    <div class="btn-row">
      <button class="btn btn-y" id="btn-ex-undo">↩ Отмена</button>
      <button class="btn btn-o" id="btn-ex-csv">↓ CSV</button>
      <button class="btn btn-r" id="btn-ex-reset">Сброс</button>
    </div>
  </div>
  <div class="log-list" id="ex-log"></div>
</div>

<!-- ROUNDS -->
<div class="page" id="page-rounds">
  <div style="padding-top:16px"></div>
  <div class="g2" id="rounds-summary"></div>
  <div class="div"></div>
  <div class="st" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px">🟡 Открытые раунды</div>
  <div id="open-rounds"></div>
  <div class="div"></div>
  <div class="st" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px">🟢 Закрытые раунды</div>
  <div id="closed-rounds"></div>
</div>

<!-- SHOP -->
<div class="page" id="page-shop">
  <div style="padding-top:16px"></div>
  <div class="avg-box" id="shop-summary">
    <div class="avg-item"><div class="av-lbl">UAH заходов</div><div class="av-val" id="sh-uah-total">0 ₴</div></div>
    <div class="avg-item"><div class="av-lbl">Средний курс</div><div class="av-val" id="sh-avg-rate">—</div></div>
    <div class="avg-item"><div class="av-lbl">USD в обороте</div><div class="av-val" id="sh-usd-pool">0 $</div></div>
    <div class="avg-item"><div class="av-lbl">Себестоимость</div><div class="av-val" id="sh-cost-total">0 $</div></div>
    <div class="avg-item"><div class="av-lbl">Прибыль</div><div class="av-val green" id="sh-profit-total">0 $</div></div>
  </div>
  <div class="g3" id="sh-agents"></div>
  <div class="section">
    <div class="st">Заход средств</div>
    <div class="row">
      <div class="field fxs"><label>Тип</label>
        <select id="sh-income-type">
          <option value="uah">Гривна → USD</option>
          <option value="usd">Прямой USD</option>
        </select>
      </div>
      <div class="field fl"><label id="sh-income-lbl">Сумма (UAH)</label><input type="number" id="sh-income-amt" placeholder="40000"></div>
      <div class="field fl" id="sh-rate-wrap"><label>Курс UAH/USD</label><input type="number" id="sh-income-rate" placeholder="41.5"></div>
      <div class="field fl" id="sh-usd-wrap"><label>Итого USD</label><input type="number" id="sh-income-usd" placeholder="963.86" readonly style="color:var(--gold)"></div>
    </div>
    <button class="btn btn-g btn-full" id="btn-sh-income">ДОБАВИТЬ ЗАХОД →</button>
  </div>
  <div class="section">
    <div class="st">Продажа</div>
    <div class="row">
      <div class="field fl"><label>Сумма продажи</label><input type="number" id="sh-sale-amt" placeholder="1200"></div>
      <div class="field fxs"><label>Валюта</label>
        <select id="sh-sale-cur"><option value="usd">USD</option><option value="uah">UAH</option></select>
      </div>
      <div class="field fl" id="sh-sale-rate-wrap" style="display:none"><label>Курс UAH/USD</label><input type="number" id="sh-sale-rate" placeholder="41.5"></div>
      <div class="field fl"><label>Себестоимость (USD)</label><input type="number" id="sh-cost" placeholder="800"></div>
      <div class="field fl"><label>Заметка</label><textarea id="sh-note" placeholder="товар, клиент..."></textarea></div>
    </div>
    <button class="btn btn-g btn-full" id="btn-sh-sale">ЗАФИКСИРОВАТЬ ПРОДАЖУ →</button>
  </div>
  <div class="charts-grid" id="sh-charts"></div>
  <div class="log-hdr">
    <div class="log-title">История</div>
    <div class="btn-row">
      <button class="btn btn-y" id="btn-sh-undo">↩ Отмена</button>
      <button class="btn btn-o" id="btn-sh-csv">↓ CSV</button>
      <button class="btn btn-r" id="btn-sh-reset">Сброс</button>
    </div>
  </div>
  <div class="log-list" id="sh-log"></div>
</div>

<script>
// ================================================================
// CONSTANTS
// ================================================================
var CURS = ['eur','huf','usdt','usd','czk'];
var SYM  = {eur:'€',huf:'Ft',usdt:'USDT',usd:'$',czk:'Kč',uah:'₴'};
var CLR  = {eur:'var(--eur)',huf:'var(--huf)',usdt:'var(--usdt)',usd:'var(--usd)',czk:'var(--czk)'};

// ================================================================
// STATE FACTORIES
// ================================================================
function freshExState() {
  return {
    capital:     {eur:3000,huf:2000000,usdt:3000,usd:0,czk:0},
    a2pct:       30,
    balances:    {eur:0,huf:0,usdt:0,usd:0,czk:0},
    profits:     {eur:0,huf:0,usdt:0,usd:0,czk:0},
    agentProfit: {a1:{eur:0,huf:0,usdt:0,usd:0,czk:0}, a2:{eur:0,huf:0,usdt:0,usd:0,czk:0}},
    rounds:      {eur:null,huf:null,usdt:null,usd:null,czk:null},
    closedRounds:[],
    deals:       []
  };
}

function freshShState() {
  return {incomes:[],sales:[],agentProfit:{owner:0,pa:0,pb:0},usdPool:0,totalCost:0,totalProfit:0};
}

var exState = freshExState();
var shState = freshShState();

// ================================================================
// PERSIST — safe for file://, GitHub Pages, any static host
// ================================================================
function save() {
  try { localStorage.setItem('bt_ex', JSON.stringify(exState)); } catch(e){}
  try { localStorage.setItem('bt_sh', JSON.stringify(shState)); } catch(e){}
}

function migrateEx(s) {
  // Guarantee every field exists regardless of which version was saved
  if (!s.capital)      s.capital      = {eur:3000,huf:2000000,usdt:3000,usd:0,czk:0};
  if (!s.deals)        s.deals        = [];
  if (!s.rounds)       s.rounds       = {eur:null,huf:null,usdt:null,usd:null,czk:null};
  if (!s.closedRounds) s.closedRounds = [];
  if (typeof s.a2pct !== 'number') s.a2pct = 30;
  CURS.forEach(function(c) {
    if (!s.capital[c])  s.capital[c]  = 0;
  });
  // Always reset these — rebuildRounds recalculates them
  s.balances    = {eur:0,huf:0,usdt:0,usd:0,czk:0};
  s.profits     = {eur:0,huf:0,usdt:0,usd:0,czk:0};
  s.agentProfit = {a1:{eur:0,huf:0,usdt:0,usd:0,czk:0}, a2:{eur:0,huf:0,usdt:0,usd:0,czk:0}};
  s.rounds      = {eur:null,huf:null,usdt:null,usd:null,czk:null};
  s.closedRounds= [];
  return s;
}

function load() {
  try {
    var ex = localStorage.getItem('bt_ex') || localStorage.getItem('exState_v8');
    var sh = localStorage.getItem('bt_sh') || localStorage.getItem('shState_v8');
    if (ex) { var p = JSON.parse(ex); if (p && p.deals) exState = migrateEx(p); }
    if (sh) { var q = JSON.parse(sh); if (q) shState = q; }
    if (!shState.agentProfit) shState.agentProfit = {owner:0,pa:0,pb:0};
  } catch(e) {
    // parse error or storage blocked — use fresh state
    exState = freshExState();
    shState = freshShState();
  }
}

// ================================================================
// HELPERS
// ================================================================
function fmt(v,c) {
  if (c==='huf'||c==='czk'||c==='uah') return Math.round(v).toLocaleString('ru')+' '+SYM[c];
  return parseFloat(v).toFixed(2)+' '+SYM[c];
}
function cap(c)   { return exState.capital[c] || 0; }
function a2pct()  { return exState.a2pct || 30; }
function a1pct()  { return 100 - a2pct(); }
function today()  { return new Date().toLocaleDateString('ru',{day:'2-digit',month:'2-digit'}); }
function nowTime(){ return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }

function syncCapital() {
  CURS.forEach(function(c) {
    exState.capital[c] = parseFloat(document.getElementById('cap-'+c).value)||0;
  });
  exState.a2pct = Math.min(99,Math.max(1,parseFloat(document.getElementById('a2-pct').value)||30));
  rebuildRounds();
  renderExchange();
}

// ================================================================
// REBUILD ROUNDS — replays entire deal history from scratch
// ================================================================
function rebuildRounds() {
  var tempBal = {eur:0,huf:0,usdt:0,usd:0,czk:0};

  // Live rate index: stores most recent known rate between any two currencies
  var rateIdx = {};
  function storeRate(give, get, rate) {
    rateIdx[give+'_'+get] = rate;
    if (rate) rateIdx[get+'_'+give] = 1/rate;
  }
  function toUsdt(amount, cur) {
    if (cur === 'usdt') return amount;
    if (rateIdx[cur+'_usdt']) return amount * rateIdx[cur+'_usdt'];
    // one-hop lookup
    for (var k in rateIdx) {
      var p = k.split('_');
      if (p[0]===cur && rateIdx[p[1]+'_usdt']) return amount * rateIdx[k] * rateIdx[p[1]+'_usdt'];
    }
    return amount; // fallback: no conversion known yet
  }

  var rounds       = {eur:null,huf:null,usdt:null,usd:null,czk:null};
  var closedRounds = [];
  var profits      = {eur:0,huf:0,usdt:0,usd:0,czk:0};
  var agentProfit  = {a1:{eur:0,huf:0,usdt:0,usd:0,czk:0}, a2:{eur:0,huf:0,usdt:0,usd:0,czk:0}};
  var a2p = a2pct()/100, a1p = a1pct()/100;

  exState.deals.forEach(function(d) {
    storeRate(d.giveCur, d.getCur, d.rate);

    var prevGet  = tempBal[d.getCur];
    var prevGive = tempBal[d.giveCur];

    tempBal[d.giveCur] -= d.giveAmount;
    tempBal[d.getCur]  += d.getAmount;

    // Open round for getCur when balance crosses zero
    if (prevGet <= 0.001 && tempBal[d.getCur] > 0.001 && !rounds[d.getCur]) {
      rounds[d.getCur] = {
        cur:d.getCur, openedDate:d.date, openedTime:d.time,
        deals:[d.id], usdtSpent:toUsdt(d.giveAmount,d.giveCur), usdtReceived:0
      };
    } else if (rounds[d.getCur]) {
      var ro = rounds[d.getCur];
      if (ro.deals.indexOf(d.id)===-1) ro.deals.push(d.id);
      ro.usdtSpent += toUsdt(d.giveAmount, d.giveCur);
    }

    // Track receipts on give-side round; close when balance hits zero
    if (rounds[d.giveCur]) {
      var rg = rounds[d.giveCur];
      if (rg.deals.indexOf(d.id)===-1) rg.deals.push(d.id);
      rg.usdtReceived += toUsdt(d.getAmount, d.getCur);
      if (tempBal[d.giveCur] <= 0.001) {
        rg.closedDate   = d.date;
        rg.closedTime   = d.time;
        rg.realizedUsdt = rg.usdtReceived - rg.usdtSpent;
        closedRounds.push(JSON.parse(JSON.stringify(rg)));
        rounds[d.giveCur] = null;
      }
    }

    // Accumulate profits
    profits[d.getCur] += d.profit;
    if (d.agent==='a1') {
      agentProfit.a1[d.getCur] += d.profit;
    } else {
      agentProfit.a2[d.getCur] += d.profit * a2p;
      agentProfit.a1[d.getCur] += d.profit * a1p;
    }
  });

  // Attach unrealized profit to open rounds (for display only)
  CURS.forEach(function(c) {
    if (rounds[c]) rounds[c].profitNative = profits[c];
  });

  exState.rounds       = rounds;
  exState.closedRounds = closedRounds;
  exState.profits      = profits;
  exState.agentProfit  = agentProfit;
  CURS.forEach(function(c) { exState.balances[c] = cap(c) + tempBal[c]; });
}

var _busy=false;
function calcHint() {
  if(_busy)return; _busy=true;
  try {
    var ga=parseFloat(document.getElementById('ex-give-amt').value);
    var ra=parseFloat(document.getElementById('ex-get-amt').value);
    var rt=parseFloat(document.getElementById('ex-rate').value);
    var sp=parseFloat(document.getElementById('ex-spread').value);
    var mode=document.getElementById('ex-calc-mode').value;
    var gc=document.getElementById('ex-give-cur').value;
    var rc=document.getElementById('ex-get-cur').value;
    var hint=document.getElementById('ex-calc-hint');
    if(!rt){hint.textContent='';return;}
    if(sp){
      var cr=rt*(1+sp/100);
      if(mode==='give'&&ga){
        var ga2=parseFloat((ga*cr).toFixed(2));
        document.getElementById('ex-get-amt').value=ga2;
        hint.innerHTML='<span style="color:var(--green)">Клиент платит: '+ga2.toFixed(2)+' '+SYM[rc]+'&nbsp;(курс '+cr.toFixed(4)+')</span>';
      } else if(mode==='get'&&ra){
        var ra2=parseFloat((ra/cr).toFixed(2));
        document.getElementById('ex-give-amt').value=ra2;
        hint.innerHTML='<span style="color:var(--green)">Мы даём: '+ra2.toFixed(2)+' '+SYM[gc]+'&nbsp;(курс '+cr.toFixed(4)+')</span>';
      } else hint.textContent='';
    } else if(ga&&ra){
      var mv=ga*rt, actual=mv>0?(ra-mv)/mv*100:0;
      var col=actual>=0?'var(--green)':'var(--red)';
      hint.innerHTML='<span style="color:'+col+'">Спред: '+(actual>=0?'+':'')+actual.toFixed(2)+'%&nbsp;|&nbsp;прибыль: '+(actual>=0?'+':'')+(ra-mv).toFixed(2)+' '+SYM[rc]+'</span>';
    } else hint.textContent='';
  } finally { _busy=false; }
}

  });
  c2+='</div></div>';
  document.getElementById('sh-charts').innerHTML=c1+c2+'<div class="chart-card"><div class="chart-title">Статистика</div><div class="bar-chart">'
    +'<div class="bar-row"><div class="bar-lbl">Заходов</div><div class="bar-track"><div class="bar-fill" style="width:100%;background:var(--muted)"></div></div><div class="bar-val">'+shState.incomes.length+'</div></div>'
    +'<div class="bar-row"><div class="bar-lbl">Продаж</div><div class="bar-track"><div class="bar-fill" style="width:100%;background:var(--muted)"></div></div><div class="bar-val">'+shState.sales.length+'</div></div>'
    +'</div></div>';

  // Log
  var log=document.getElementById('sh-log');
  if(!shState.incomes.length&&!shState.sales.length){log.innerHTML='<div class="empty">Записей пока нет</div>';return;}
  var h='', idx=0;
  shState.incomes.forEach(function(it,i){
    h+='<div class="li"><div class="li-n">'+(++idx)+'</div>'
      +'<div><div class="li-m"><span class="tag t-uah">+'+it.amount.toLocaleString('ru')+' ₴</span>'
      +(it.rate?' → <span class="tag t-usd">'+it.usd.toFixed(2)+' $</span>':'')+'</div>'
      +'<div class="li-s">'+it.date+(it.rate?' · курс '+it.rate:'')+'</div></div>'
      +'<div class="li-p"><div class="li-pv" style="color:var(--green)">+'+it.usd.toFixed(2)+' $</div></div>'
      +'<button class="db" data-sh-del-i="'+i+'">✕</button></div>';
  });
  shState.sales.forEach(function(s,i){
    var col=s.profit>=0?'var(--green)':'var(--red)';
    h+='<div class="li"><div class="li-n">'+(++idx)+'</div>'
      +'<div><div class="li-m"><span class="tag t-usd">'+s.saleUsd.toFixed(2)+' $</span>'
      +(s.note?' <span style="color:var(--muted);font-size:10px">'+s.note+'</span>':'')+'</div>'
      +'<div class="li-s">'+s.date+' · себест. '+s.cost.toFixed(2)+' $</div></div>'
      +'<div class="li-p"><div class="li-pv" style="color:'+col+'">'+(s.profit>=0?'+':'')+s.profit.toFixed(2)+' $</div></div>'
      +'<button class="db" data-sh-del-s="'+i+'">✕</button></div>';
  });
  log.innerHTML=h;
}

// ================================================================
// SHOP — ACTIONS
// ================================================================
document.getElementById('sh-income-type').addEventListener('change',function(){
  var t=this.value;
  document.getElementById('sh-income-lbl').textContent=t==='uah'?'Сумма (UAH)':'Сумма (USD)';
  document.getElementById('sh-rate-wrap').style.display=t==='uah'?'':'none';
  document.getElementById('sh-usd-wrap').style.display=t==='uah'?'':'none';
  document.getElementById('sh-income-amt').value='';
  document.getElementById('sh-income-usd').value='';
});
document.getElementById('sh-income-amt').addEventListener('input',function(){
  if(document.getElementById('sh-income-type').value!=='uah')return;
  var a=parseFloat(this.value)||0,r=parseFloat(document.getElementById('sh-income-rate').value)||0;
  if(r)document.getElementById('sh-income-usd').value=(a/r).toFixed(2);
});
document.getElementById('sh-income-rate').addEventListener('input',function(){
  var a=parseFloat(document.getElementById('sh-income-amt').value)||0,r=parseFloat(this.value)||0;
  if(r)document.getElementById('sh-income-usd').value=(a/r).toFixed(2);
});
document.getElementById('sh-sale-cur').addEventListener('change',function(){
  document.getElementById('sh-sale-rate-wrap').style.display=this.value==='uah'?'':'none';
});

document.getElementById('btn-sh-income').addEventListener('click',function(){
  var type=document.getElementById('sh-income-type').value;
  var amt=parseFloat(document.getElementById('sh-income-amt').value);
  if(!amt){alert('Введи сумму');return;}
  var usd,rate=0;
  if(type==='uah'){
    rate=parseFloat(document.getElementById('sh-income-rate').value);
    if(!rate){alert('Введи курс');return;}
    usd=amt/rate;
  } else usd=amt;
  shState.incomes.push({type:type,amount:amt,rate:rate,usd:usd,date:today()});
  shState.usdPool+=usd;
  document.getElementById('sh-income-amt').value='';
  document.getElementById('sh-income-rate').value='';
  document.getElementById('sh-income-usd').value='';
  save(); renderShop();
});

document.getElementById('btn-sh-sale').addEventListener('click',function(){
  var amt=parseFloat(document.getElementById('sh-sale-amt').value);
  var cur=document.getElementById('sh-sale-cur').value;
  var cost=parseFloat(document.getElementById('sh-cost').value);
  var note=document.getElementById('sh-note').value.trim();
  if(!amt||!cost){alert('Заполни сумму и себестоимость');return;}
  var saleUsd,saleRate=0;
  if(cur==='uah'){
    saleRate=parseFloat(document.getElementById('sh-sale-rate').value);
    if(!saleRate){alert('Введи курс');return;}
    saleUsd=amt/saleRate;
  } else saleUsd=amt;
  var profit=saleUsd-cost;
  shState.totalCost+=cost;
  shState.totalProfit+=profit;
  shState.agentProfit.owner+=profit*0.5;
  shState.agentProfit.pa+=profit*0.25;
  shState.agentProfit.pb+=profit*0.25;
  shState.sales.push({saleAmount:amt,saleCur:cur,saleRate:saleRate,saleUsd:saleUsd,cost:cost,profit:profit,note:note,date:today()});
  document.getElementById('sh-sale-amt').value='';
  document.getElementById('sh-cost').value='';
  document.getElementById('sh-sale-rate').value='';
  document.getElementById('sh-note').value='';
  save(); renderShop();
});

document.getElementById('btn-sh-undo').addEventListener('click',function(){
  if(shState.sales.length){
    var s=shState.sales.pop();
    shState.totalCost-=s.cost; shState.totalProfit-=s.profit;
    shState.agentProfit.owner-=s.profit*0.5;
    shState.agentProfit.pa-=s.profit*0.25;
    shState.agentProfit.pb-=s.profit*0.25;
    save(); renderShop(); return;
  }
  if(shState.incomes.length){
    shState.usdPool-=shState.incomes.pop().usd;
    save(); renderShop(); return;
  }
  alert('Нет записей');
});

document.getElementById('sh-log').addEventListener('click',function(e){
  var t=e.target; while(t&&t!==this){
    var i=t.getAttribute('data-sh-del-i');
    var s=t.getAttribute('data-sh-del-s');
    if(i!==null){
      shState.usdPool-=shState.incomes[parseInt(i)].usd;
      shState.incomes.splice(parseInt(i),1); save(); renderShop(); return;
    }
    if(s!==null){
      var sale=shState.sales[parseInt(s)];
      shState.totalCost-=sale.cost; shState.totalProfit-=sale.profit;
      shState.agentProfit.owner-=sale.profit*0.5;
      shState.agentProfit.pa-=sale.profit*0.25;
      shState.agentProfit.pb-=sale.profit*0.25;
      shState.sales.splice(parseInt(s),1); save(); renderShop(); return;
    }
    t=t.parentNode;
  }
});

document.getElementById('btn-sh-csv').addEventListener('click',function(){
  var rows=[['#','Дата','Тип','Сумма','Вал','Курс','USD','Себест.','Прибыль','Заметка']];
  shState.incomes.forEach(function(it,i){
    rows.push([i+1,it.date,'Заход',it.amount,it.type==='uah'?'UAH':'USD',it.rate,it.usd.toFixed(2),'','','']);
  });
  shState.sales.forEach(function(s,i){
    rows.push([i+1,s.date,'Продажа',s.saleAmount,s.saleCur.toUpperCase(),s.saleRate,s.saleUsd.toFixed(2),s.cost.toFixed(2),s.profit.toFixed(2),s.note]);
  });
  dlCsv(rows,'shop.csv');
});

document.getElementById('btn-sh-reset').addEventListener('click',function(){
  if(!confirm('Сбросить магазин?'))return;
  if(!confirm('Точно?'))return;
  shState=freshShState(); save(); renderShop();
});

// ================================================================
// CSV HELPER
// ================================================================
function dlCsv(rows,name){
  var csv=rows.map(function(r){return r.map(function(v){return '"'+(v||'')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ================================================================
// INIT
// ================================================================
load();
// Sync capital inputs from loaded state
CURS.forEach(function(c){
  var el=document.getElementById('cap-'+c);
  if(el) el.value=exState.capital[c]||0;
});
var a2el=document.getElementById('a2-pct');
if(a2el) a2el.value=exState.a2pct;

rebuildRounds();
renderExchange();
</script>
